<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Create Room</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h2 id="modalTitle">Create Room</h2>

    <form id="roomForm">
      <label for="roomName">Room Name:</label>
      <input type="text" id="roomName" required />

      <label for="capacity">Capacity:</label>
      <input type="number" id="capacity" required />

      <label for="price">Price:</label>
      <input type="number" id="price" required />

      <label for="promo">Promo Code:</label>
      <input type="text" id="promo" />

      <label for="roomDate">Date:</label>
      <input type="date" id="roomDate" required />

      <label for="roomStartTime">Start Time:</label>
      <input type="time" id="roomStartTime" required />

      <label for="roomEndTime">End Time:</label>
      <input type="time" id="roomEndTime" required />

      <button type="submit" id="submitBtn">Create Room</button>
      <button type="button" id="backBtn">Back</button>
    </form>

    <script src="config.js"></script>
    <script src="database.js"></script>
    <script src="script.js"></script>
  </body>
</html>
