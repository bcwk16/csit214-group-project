<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="flex-between mb-20 flex-wrap gap-15">
      <h2>Available Rooms</h2>
      <div class="header-actions">
        Welcome, <strong id="studentName">student</strong>!
        <div class="badge">Balance: $<span id="walletBalance">0</span></div>
        <a href="deposit.html"><button>Deposit</button></a>
        <a href="index.html"><button>Logout</button></a>
      </div>
    </div>

    <div id="roomsContainer"></div>

    <h3>Your Bookings</h3>
    <table>
      <thead>
        <tr>
          <th>Room</th>
          <th>Date</th>
          <th>Start Time</th>
          <th>End Time</th>
          <th>Original Price</th>
          <th>Discount</th>
          <th>Final Paid</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="studentBookings"></tbody>
    </table>

    <script src="script.js"></script>
  </body>
</html>
