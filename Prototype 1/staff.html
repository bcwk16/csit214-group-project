<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>UOW Room Management</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="staff-header">
      <h2>UOW Room Management</h2>
      <div class="staff-header-buttons">
        <a href="room-form.html"><button>Create Room</button></a>
        <a href="promo-form.html"><button>Create Promo Code</button></a>
        <a href="index.html"><button>Logout</button></a>
      </div>
    </div>

    <h3>Rooms</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Capacity</th>
          <th>Price</th>
          <th>Date</th>
          <th>Start</th>
          <th>End</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="roomTable"></tbody>
    </table>

    <h3>Promo Codes</h3>
    <table>
      <thead>
        <tr>
          <th>Code</th>
          <th>Discount</th>
          <th>Valid Until</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="promoTable"></tbody>
    </table>

    <script src="script.js"></script>
  </body>
</html>
